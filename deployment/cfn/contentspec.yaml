version: 2.0

params:
  author: 'Shayon Sanyal'
  description: 'DAT406 - Build agentic AI-powered search with Amazon Aurora, pgvector, and Amazon RDS'
  disableAssetsBusting: true
  disableBreadcrumb: false
  disableInlineCopyToClipBoard: true
  disableLanguageSwitchingButton: true
  disableNextPrev: false
  disableSearch: false
  disableShortcutsTitle: true
  themeVariant: aws  

defaultLocaleCode: en-US
localeCodes:
  - en-US

additionalLinks:
  - title: Supercharging vector search performance and relevance with pgvector 0.8.0 on Amazon Aurora PostgreSQL
    link: https://aws.amazon.com/blogs/database/supercharging-vector-search-performance-and-relevance-with-pgvector-0-8-0-on-amazon-aurora-postgresql/
  - title: Supercharging AWS database development with AWS MCP servers
    link: https://aws.amazon.com/blogs/database/supercharging-aws-database-development-with-aws-mcp-servers/
  - title: Strands Agents Link
    link: https://strandsagents.com
  - title: pgvector Documentation
    link: https://github.com/pgvector/pgvector

awsAccountConfig:
  accountSources:
    - WorkshopStudio
    - CustomerProvided    
  serviceLinkedRoles:
    - rds.amazonaws.com

  participantRole:
    iamPolicies:
      - static/iam_policy.json
    managedPolicies:
      - "arn:aws:iam::aws:policy/AmazonRDSFullAccess"
      - "arn:aws:iam::aws:policy/AmazonSageMakerFullAccess"
      - "arn:aws:iam::aws:policy/AWSCloudFormationFullAccess"
      - "arn:aws:iam::aws:policy/CloudWatchLogsFullAccess"
      - "arn:aws:iam::aws:policy/AmazonBedrockFullAccess"
      - "arn:aws:iam::aws:policy/AmazonQFullAccess"

    trustedPrincipals:
      service: 
        - ec2.amazonaws.com
        - lambda.amazonaws.com
        - bedrock.amazonaws.com
        - rds.amazonaws.com
        - cloudfront.amazonaws.com

  ec2KeyPair: false 

  regionConfiguration:
    minAccessibleRegions: 1
    maxAccessibleRegions: 2
    accessibleRegions:
    deployableRegions:
      required:
        - us-west-2
      recommended:
        - us-east-1

# START Infrastructure
infrastructure:
  cloudformationTemplates:
    - templateLocation: static/genai-dat-406-labs.yml
      label: "DAT406 - Blaize Bazaar AI-powered Search Platform"
      parameters:
        - templateParameter: ParticipantRoleArn
          defaultValue: "{{.ParticipantRoleArn}}"
        - templateParameter: AssetsBucketName
          defaultValue: "{{.AssetsBucketName}}"
        - templateParameter: AssetsBucketPrefix
          defaultValue: "{{.AssetsBucketPrefix}}"
        - templateParameter: IsWorkshopStudioEnv
          defaultValue: "yes"
        - templateParameter: DBInstanceSize
          defaultValue: "db.r6gd.4xlarge"
        - templateParameter: CodeEditorInstanceType
          defaultValue: "c6g.2xlarge"
        - templateParameter: CodeEditorVolumeSize
          defaultValue: "100"
      participantVisibleStackOutputs:
        # Participant visible outputs
        - CodeEditorURL