<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <!-- Purple gradient for main elements -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Lighter purple for specialist agents -->
    <linearGradient id="specialistGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b21a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Green gradient for tools -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Amber gradient for database -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="580" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="600">
    Blaize Bazaar Multi-Agent Architecture
  </text>
  <text x="450" y="62" text-anchor="middle" fill="#a78bfa" font-size="13">
    "Agents as Tools" Pattern with Aurora PostgreSQL
  </text>
  
  <!-- User Query Box -->
  <rect x="360" y="85" width="180" height="50" rx="10" fill="rgba(124,58,237,0.2)" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="112" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="500">👤 User Query</text>
  <text x="450" y="128" text-anchor="middle" fill="#c4b5fd" font-size="10">"What laptops under $1000?"</text>
  
  <!-- Arrow from User to Orchestrator -->
  <line x1="450" y1="135" x2="450" y2="165" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Orchestrator Agent (Central, Top) -->
  <g filter="url(#dropShadow)">
    <rect x="310" y="170" width="280" height="90" rx="12" fill="url(#purpleGrad)"/>
    <text x="450" y="200" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">🎯 Orchestrator Agent</text>
    <text x="450" y="222" text-anchor="middle" fill="#e9d5ff" font-size="11">Analyzes queries • Routes to specialists</text>
    <text x="450" y="240" text-anchor="middle" fill="#e9d5ff" font-size="11">Synthesizes responses</text>
    <text x="450" y="255" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="500">Tools: Specialist Agents (callable)</text>
  </g>
  
  <!-- Arrows from Orchestrator to Specialists -->
  <path d="M 350 260 Q 350 295 230 320" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 450 260 L 450 315" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 550 260 Q 550 295 670 320" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Inventory Agent (Left) -->
  <g filter="url(#dropShadow)">
    <rect x="70" y="320" width="200" height="100" rx="10" fill="url(#specialistGrad)"/>
    <text x="170" y="348" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">📦 Inventory Agent</text>
    <text x="170" y="368" text-anchor="middle" fill="#e9d5ff" font-size="10">Stock levels • Restocking</text>
    <text x="170" y="384" text-anchor="middle" fill="#e9d5ff" font-size="10">Availability monitoring</text>
    <line x1="90" y1="395" x2="250" y2="395" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="170" y="412" text-anchor="middle" fill="#86efac" font-size="9">get_inventory_health()</text>
  </g>
  
  <!-- Pricing Agent (Center) -->
  <g filter="url(#dropShadow)">
    <rect x="310" y="320" width="200" height="100" rx="10" fill="url(#specialistGrad)"/>
    <text x="410" y="348" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">💰 Pricing Agent</text>
    <text x="410" y="368" text-anchor="middle" fill="#e9d5ff" font-size="10">Price analysis • Value recs</text>
    <text x="410" y="384" text-anchor="middle" fill="#e9d5ff" font-size="10">Category statistics</text>
    <line x1="330" y1="395" x2="490" y2="395" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="410" y="412" text-anchor="middle" fill="#86efac" font-size="9">get_category_price_analysis()</text>
  </g>
  
  <!-- Recommendation Agent (Right) -->
  <g filter="url(#dropShadow)">
    <rect x="550" y="320" width="200" height="100" rx="10" fill="url(#specialistGrad)"/>
    <text x="650" y="348" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">⭐ Recommendation Agent</text>
    <text x="650" y="368" text-anchor="middle" fill="#e9d5ff" font-size="10">Semantic search • Trending</text>
    <text x="650" y="384" text-anchor="middle" fill="#e9d5ff" font-size="10">Personalized suggestions</text>
    <line x1="570" y1="395" x2="730" y2="395" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="650" y="412" text-anchor="middle" fill="#86efac" font-size="9">semantic_product_search()</text>
  </g>
  
  <!-- Arrows from Specialists to Database -->
  <path d="M 170 420 L 170 455 Q 170 475 350 490" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowheadGreen)" stroke-dasharray="5,3"/>
  <line x1="410" y1="420" x2="410" y2="485" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowheadGreen)" stroke-dasharray="5,3"/>
  <path d="M 650 420 L 650 455 Q 650 475 470 490" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowheadGreen)" stroke-dasharray="5,3"/>
  
  <!-- Aurora PostgreSQL Database -->
  <g filter="url(#dropShadow)">
    <rect x="280" y="490" width="260" height="70" rx="10" fill="url(#amberGrad)"/>
    <text x="410" y="520" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">🗄️ Aurora PostgreSQL</text>
    <text x="410" y="540" text-anchor="middle" fill="#fef3c7" font-size="11">pgvector • Product Catalog • Embeddings</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(760, 320)">
    <rect x="-10" y="-10" width="130" height="130" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="55" y="10" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">Legend</text>
    
    <rect x="5" y="25" width="16" height="16" rx="3" fill="url(#purpleGrad)"/>
    <text x="28" y="37" fill="#e9d5ff" font-size="9">Orchestrator</text>
    
    <rect x="5" y="48" width="16" height="16" rx="3" fill="url(#specialistGrad)"/>
    <text x="28" y="60" fill="#e9d5ff" font-size="9">Specialist Agent</text>
    
    <line x1="5" y1="78" x2="21" y2="78" stroke="#a855f7" stroke-width="2"/>
    <text x="28" y="82" fill="#e9d5ff" font-size="9">Routes query</text>
    
    <line x1="5" y1="98" x2="21" y2="98" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="28" y="102" fill="#e9d5ff" font-size="9">DB connection</text>
  </g>
  
  <!-- Pattern Label -->
  <rect x="70" y="485" width="170" height="45" rx="8" fill="rgba(124,58,237,0.15)" stroke="#7c3aed" stroke-width="1"/>
  <text x="155" y="505" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="600">⭐ Agents as Tools Pattern</text>
  <text x="155" y="520" text-anchor="middle" fill="#c4b5fd" font-size="9">Specialists = Callable tools</text>
</svg>
