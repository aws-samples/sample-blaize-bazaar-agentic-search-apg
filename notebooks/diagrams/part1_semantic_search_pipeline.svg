<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <!-- Purple gradient for main elements -->
    <linearGradient id="purpleGradP1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blue gradient for Bedrock -->
    <linearGradient id="blueGradP1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Amber gradient for database -->
    <linearGradient id="amberGradP1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Green gradient for results -->
    <linearGradient id="greenGradP1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background gradient -->
    <linearGradient id="bgGradP1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow filter -->
    <filter id="dropShadowP1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="arrowPurpleP1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    
    <marker id="arrowBlueP1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    
    <marker id="arrowAmberP1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    
    <marker id="arrowGreenP1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGradP1)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="600">
    Semantic Search Pipeline
  </text>
  <text x="450" y="60" text-anchor="middle" fill="#a78bfa" font-size="13">
    Natural Language → Vector Embedding → pgvector Similarity → Results
  </text>
  
  <!-- Step 1: User Query -->
  <g filter="url(#dropShadowP1)">
    <rect x="50" y="100" width="180" height="100" rx="12" fill="url(#purpleGradP1)"/>
    <text x="140" y="130" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">💬 User Query</text>
    <text x="140" y="152" text-anchor="middle" fill="#e9d5ff" font-size="10">"something to keep</text>
    <text x="140" y="168" text-anchor="middle" fill="#e9d5ff" font-size="10">my coffee hot"</text>
    <text x="140" y="190" text-anchor="middle" fill="#fbbf24" font-size="9">Natural language</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="230" y1="150" x2="280" y2="150" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowPurpleP1)"/>
  <text x="255" y="140" text-anchor="middle" fill="#c4b5fd" font-size="9">Step 1</text>
  
  <!-- Step 2: Bedrock Titan -->
  <g filter="url(#dropShadowP1)">
    <rect x="285" y="90" width="200" height="120" rx="12" fill="url(#blueGradP1)"/>
    <text x="385" y="120" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">🧠 Amazon Bedrock</text>
    <text x="385" y="142" text-anchor="middle" fill="#bfdbfe" font-size="11">Titan Text Embeddings V2</text>
    <line x1="305" y1="155" x2="465" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="385" y="175" text-anchor="middle" fill="#93c5fd" font-size="10">Generates 1024-dimensional</text>
    <text x="385" y="192" text-anchor="middle" fill="#93c5fd" font-size="10">vector embedding</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="485" y1="150" x2="535" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlueP1)"/>
  <text x="510" y="140" text-anchor="middle" fill="#93c5fd" font-size="9">Step 2</text>
  
  <!-- Step 3: pgvector Search -->
  <g filter="url(#dropShadowP1)">
    <rect x="540" y="90" width="200" height="120" rx="12" fill="url(#amberGradP1)"/>
    <text x="640" y="120" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">🔍 pgvector Search</text>
    <text x="640" y="142" text-anchor="middle" fill="#fef3c7" font-size="11">Cosine Distance (&lt;=&gt;)</text>
    <line x1="560" y1="155" x2="720" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="640" y="175" text-anchor="middle" fill="#fde68a" font-size="10">Compares query vector to</text>
    <text x="640" y="192" text-anchor="middle" fill="#fde68a" font-size="10">21,704 product embeddings</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="740" y1="150" x2="790" y2="150" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmberP1)"/>
  <text x="765" y="140" text-anchor="middle" fill="#fcd34d" font-size="9">Step 3</text>
  
  <!-- Step 4: Results -->
  <g filter="url(#dropShadowP1)">
    <rect x="795" y="100" width="85" height="100" rx="12" fill="url(#greenGradP1)"/>
    <text x="837" y="130" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">✅</text>
    <text x="837" y="152" text-anchor="middle" fill="#bbf7d0" font-size="10">Top-K</text>
    <text x="837" y="168" text-anchor="middle" fill="#bbf7d0" font-size="10">Results</text>
    <text x="837" y="190" text-anchor="middle" fill="#fbbf24" font-size="9">Ranked</text>
  </g>
  
  <!-- Vector Representation Section -->
  <rect x="50" y="240" width="800" height="130" rx="10" fill="rgba(0,0,0,0.25)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="450" y="268" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Vector Embedding Visualization</text>
  
  <!-- Query Vector -->
  <g transform="translate(80, 290)">
    <rect x="0" y="0" width="350" height="60" rx="6" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1"/>
    <text x="175" y="20" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">Query Vector (1024 dimensions)</text>
    <text x="175" y="45" text-anchor="middle" fill="#bfdbfe" font-size="9" font-family="monospace">[0.023, -0.156, 0.089, 0.234, ..., -0.045]</text>
  </g>
  
  <!-- Product Vectors -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="350" height="60" rx="6" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1"/>
    <text x="175" y="20" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">Product Embeddings (pre-computed)</text>
    <text x="175" y="45" text-anchor="middle" fill="#fef3c7" font-size="9" font-family="monospace">[0.018, -0.142, 0.095, 0.228, ..., -0.038]</text>
  </g>
  
  <!-- Comparison Section -->
  <rect x="50" y="390" width="800" height="110" rx="10" fill="rgba(0,0,0,0.25)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="450" y="418" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Keyword Search vs Semantic Search</text>
  
  <!-- Keyword Search -->
  <g transform="translate(80, 435)">
    <rect x="0" y="0" width="340" height="50" rx="6" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1"/>
    <text x="170" y="20" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">❌ Keyword: "keep coffee hot"</text>
    <text x="170" y="40" text-anchor="middle" fill="#fecaca" font-size="9">Searches exact words → Often finds nothing</text>
  </g>
  
  <!-- Semantic Search -->
  <g transform="translate(480, 435)">
    <rect x="0" y="0" width="340" height="50" rx="6" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
    <text x="170" y="20" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">✅ Semantic: Understands intent</text>
    <text x="170" y="40" text-anchor="middle" fill="#bbf7d0" font-size="9">Finds: Insulated mugs, travel tumblers, thermoses</text>
  </g>
  
  <!-- Key metrics callout -->
  <rect x="50" y="230" width="140" height="25" rx="5" fill="rgba(124,58,237,0.2)" stroke="#7c3aed" stroke-width="1"/>
  <text x="120" y="247" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="500">⚡ &lt;50ms with HNSW</text>
  
  <!-- Similarity threshold callout -->
  <rect x="710" y="230" width="140" height="25" rx="5" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
  <text x="780" y="247" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="500">🎯 Threshold: 0.3</text>
</svg>
