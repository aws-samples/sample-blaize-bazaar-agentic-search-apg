<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 680" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <!-- Purple gradients for layers -->
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="layer4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#581c87;stop-opacity:1" />
    </linearGradient>
    
    <!-- Green gradient for savings -->
    <linearGradient id="greenGradP2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background gradient -->
    <linearGradient id="bgGradP2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow -->
    <filter id="dropShadowP2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="950" height="680" fill="url(#bgGradP2)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="600">
    The Context Pyramid: 96% Token Reduction
  </text>
  <text x="450" y="60" text-anchor="middle" fill="#a78bfa" font-size="13">
    Progressive refinement from raw data to intelligent agent decisions
  </text>
  
  <!-- PYRAMID - Centered at x=450 -->
  <!-- Extended top layer to fit text better -->
  
  <!-- Layer 1 (Top): Claude Agent - Expanded for better text fit -->
  <g filter="url(#dropShadowP2)">
    <polygon points="450,85 540,190 360,190" fill="url(#layer1Grad)" stroke="#e9d5ff" stroke-width="2"/>
    <text x="450" y="138" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">🤖 Claude Sonnet 4</text>
    <text x="450" y="160" text-anchor="middle" fill="#581c87" font-size="10">Agent Decisions</text>
  </g>
  
  <!-- Layer 2: Context Manager -->
  <g filter="url(#dropShadowP2)">
    <polygon points="355,195 545,195 620,285 280,285" fill="url(#layer2Grad)" stroke="#c4b5fd" stroke-width="2"/>
    <text x="450" y="228" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">📊 Context Manager</text>
    <text x="450" y="248" text-anchor="middle" fill="#e9d5ff" font-size="10">Token Budgeting • Auto-Pruning @ 85%</text>
    <text x="450" y="268" text-anchor="middle" fill="#fbbf24" font-size="10">180K token limit</text>
  </g>
  
  <!-- Layer 3: Custom Tools -->
  <g filter="url(#dropShadowP2)">
    <polygon points="276,290 624,290 700,380 200,380" fill="url(#layer3Grad)" stroke="#a78bfa" stroke-width="2"/>
    <text x="450" y="320" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">⚙️ Structured Context (Custom Tools)</text>
    <text x="450" y="343" text-anchor="middle" fill="#e9d5ff" font-size="10">get_trending_products() • semantic_product_search()</text>
    <text x="450" y="365" text-anchor="middle" fill="#86efac" font-size="10" font-weight="500">~2K tokens per query</text>
  </g>
  
  <!-- Layer 4 (Bottom): Raw Data -->
  <g filter="url(#dropShadowP2)">
    <polygon points="196,385 704,385 780,475 120,475" fill="url(#layer4Grad)" stroke="#7c3aed" stroke-width="2"/>
    <text x="450" y="415" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">🗄️ Raw Data (Aurora PostgreSQL)</text>
    <text x="450" y="438" text-anchor="middle" fill="#e9d5ff" font-size="10">21,704 products • Full schema • Complete catalog</text>
    <text x="450" y="460" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="500">~50K tokens unfiltered</text>
  </g>
  
  <!-- Layer Functions Panel -->
  <g transform="translate(795, 100)">
    <rect x="0" y="0" width="140" height="280" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="70" y="25" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Layer Functions</text>
    
    <!-- Agent annotation -->
    <text x="70" y="60" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="500">Makes decisions</text>
    <text x="70" y="78" text-anchor="middle" fill="#9ca3af" font-size="9">200K window</text>
    
    <!-- Context Manager annotation -->
    <text x="70" y="115" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="500">Optimizes tokens</text>
    <text x="70" y="133" text-anchor="middle" fill="#9ca3af" font-size="9">Prunes intelligently</text>
    
    <!-- Tools annotation -->
    <text x="70" y="175" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="500">Filters &amp; formats</text>
    <text x="70" y="193" text-anchor="middle" fill="#9ca3af" font-size="9">Business logic</text>
    
    <!-- Raw Data annotation -->
    <text x="70" y="240" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="500">Complete info</text>
    <text x="70" y="258" text-anchor="middle" fill="#9ca3af" font-size="9">Unfiltered</text>
  </g>
  
  <!-- Comparison Section -->
  <rect x="50" y="500" width="850" height="160" rx="10" fill="rgba(0,0,0,0.25)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="475" y="528" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Token Efficiency: Before vs After</text>
  
  <!-- Before (Without Context Management) -->
  <g transform="translate(80, 545)">
    <rect x="0" y="0" width="370" height="100" rx="8" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1"/>
    <text x="185" y="25" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">❌ Without Context Management</text>
    <line x1="20" y1="38" x2="350" y2="38" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
    <text x="185" y="58" text-anchor="middle" fill="#fecaca" font-size="11">~60,000 tokens per query</text>
    <text x="185" y="76" text-anchor="middle" fill="#fecaca" font-size="11">$0.18 per query</text>
    <text x="185" y="93" text-anchor="middle" fill="#f87171" font-size="9">Full schema + all data + complete history</text>
  </g>
  
  <!-- After (With Context Management) -->
  <g transform="translate(500, 545)">
    <rect x="0" y="0" width="370" height="100" rx="8" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
    <text x="185" y="25" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">✅ With Context Management</text>
    <line x1="20" y1="38" x2="350" y2="38" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="185" y="58" text-anchor="middle" fill="#bbf7d0" font-size="11">~4,000 tokens per query</text>
    <text x="185" y="76" text-anchor="middle" fill="#bbf7d0" font-size="11">$0.012 per query</text>
    <text x="185" y="93" text-anchor="middle" fill="#4ade80" font-size="9">Structured tools + relevant context only</text>
  </g>
</svg>
