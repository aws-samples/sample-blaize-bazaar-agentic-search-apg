<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 680" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <!-- Purple gradient -->
    <linearGradient id="purpleGradMCP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Green gradient for custom tools -->
    <linearGradient id="greenGradMCP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Amber gradient for MCP -->
    <linearGradient id="amberGradMCP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blue gradient for database -->
    <linearGradient id="blueGradMCP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background gradient -->
    <linearGradient id="bgGradMCP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow -->
    <filter id="dropShadowMCP" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="arrowPurpleMCP" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#a855f7"/>
    </marker>
    
    <marker id="arrowGreenMCP" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#22c55e"/>
    </marker>
    
    <marker id="arrowAmberMCP" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="950" height="680" fill="url(#bgGradMCP)" rx="12"/>
  
  <!-- Title -->
  <text x="475" y="38" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="600">
    MCP Architecture: Three Layers of Intelligence
  </text>
  <text x="475" y="62" text-anchor="middle" fill="#a78bfa" font-size="13">
    HOW to access data → WHAT to do with it → WHEN to use which tool
  </text>
  
  <!-- Layer 3 (Top): Agents - WHEN -->
  <g filter="url(#dropShadowMCP)">
    <rect x="220" y="95" width="510" height="115" rx="12" fill="url(#purpleGradMCP)"/>
    <text x="475" y="135" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="600">🤖 Agent Layer</text>
    <text x="475" y="160" text-anchor="middle" fill="#e9d5ff" font-size="12">Knows WHEN to use which tool</text>
    <line x1="250" y1="176" x2="700" y2="176" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="475" y="196" text-anchor="middle" fill="#fbbf24" font-size="11">"Use trending for discovery, search for specific needs"</text>
  </g>
  
  <!-- Arrow from Agents to Tools -->
  <line x1="475" y1="210" x2="475" y2="260" stroke="#a855f7" stroke-width="3" marker-end="url(#arrowPurpleMCP)"/>
  <text x="500" y="240" fill="#c4b5fd" font-size="11">calls</text>
  
  <!-- Layer 2 (Middle): Custom Tools - WHAT -->
  <g filter="url(#dropShadowMCP)">
    <rect x="170" y="275" width="610" height="125" rx="12" fill="url(#greenGradMCP)"/>
    <text x="475" y="315" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="600">⚙️ Custom Tools Layer (@tool decorator)</text>
    <text x="475" y="342" text-anchor="middle" fill="#bbf7d0" font-size="12">Knows WHAT to do with data (Business Logic)</text>
    <line x1="200" y1="358" x2="750" y2="358" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="300" y="383" text-anchor="middle" fill="#fef08a" font-size="11" font-family="monospace">get_trending_products()</text>
    <text x="475" y="383" text-anchor="middle" fill="#fef08a" font-size="11" font-family="monospace">semantic_search()</text>
    <text x="650" y="383" text-anchor="middle" fill="#fef08a" font-size="11" font-family="monospace">get_price_analysis()</text>
  </g>
  
  <!-- Arrow from Tools to MCP -->
  <line x1="475" y1="400" x2="475" y2="450" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowGreenMCP)"/>
  <text x="500" y="430" fill="#86efac" font-size="11">uses</text>
  
  <!-- Layer 1 (Bottom): MCP Server - HOW -->
  <g filter="url(#dropShadowMCP)">
    <rect x="200" y="465" width="550" height="115" rx="12" fill="url(#amberGradMCP)"/>
    <text x="475" y="505" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="600">🔌 MCP Server Layer</text>
    <text x="475" y="530" text-anchor="middle" fill="#fef3c7" font-size="12">Knows HOW to access data (Infrastructure)</text>
    <line x1="230" y1="546" x2="720" y2="546" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="375" y="568" text-anchor="middle" fill="#fef08a" font-size="11" font-family="monospace">run_query()</text>
    <text x="575" y="568" text-anchor="middle" fill="#fef08a" font-size="11" font-family="monospace">get_table_schema()</text>
  </g>
  
  <!-- Arrow from MCP to Database - Fixed positioning -->
  <line x1="475" y1="580" x2="475" y2="618" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrowAmberMCP)"/>
  <text x="510" y="605" fill="#fcd34d" font-size="11">connects</text>
  
  <!-- Database at bottom -->
  <g filter="url(#dropShadowMCP)">
    <rect x="325" y="630" width="300" height="40" rx="10" fill="url(#blueGradMCP)"/>
    <text x="475" y="656" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="500">🗄️ Aurora PostgreSQL</text>
  </g>
  
  <!-- Key Distinction Table on the right -->
  <g transform="translate(800, 95)">
    <rect x="0" y="0" width="140" height="490" rx="8" fill="rgba(0,0,0,0.3)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Key Distinction</text>
    <line x1="10" y1="42" x2="130" y2="42" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    
    <!-- Agent -->
    <rect x="10" y="55" width="120" height="100" rx="4" fill="rgba(124,58,237,0.2)"/>
    <text x="70" y="80" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">AGENTS</text>
    <text x="70" y="100" text-anchor="middle" fill="#e9d5ff" font-size="9">Routing decisions</text>
    <text x="70" y="117" text-anchor="middle" fill="#e9d5ff" font-size="9">Context awareness</text>
    <text x="70" y="143" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">WHEN</text>
    
    <!-- Custom Tools -->
    <rect x="10" y="165" width="120" height="100" rx="4" fill="rgba(34,197,94,0.2)"/>
    <text x="70" y="190" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">CUSTOM TOOLS</text>
    <text x="70" y="210" text-anchor="middle" fill="#bbf7d0" font-size="9">Business rules</text>
    <text x="70" y="227" text-anchor="middle" fill="#bbf7d0" font-size="9">Domain logic</text>
    <text x="70" y="253" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">WHAT</text>
    
    <!-- MCP Server -->
    <rect x="10" y="275" width="120" height="100" rx="4" fill="rgba(245,158,11,0.2)"/>
    <text x="70" y="300" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">MCP SERVER</text>
    <text x="70" y="320" text-anchor="middle" fill="#fef3c7" font-size="9">SQL execution</text>
    <text x="70" y="337" text-anchor="middle" fill="#fef3c7" font-size="9">Schema access</text>
    <text x="70" y="363" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">HOW</text>
    
    <!-- Database -->
    <rect x="10" y="385" width="120" height="90" rx="4" fill="rgba(59,130,246,0.2)"/>
    <text x="70" y="418" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">DATABASE</text>
    <text x="70" y="445" text-anchor="middle" fill="#bfdbfe" font-size="9">Raw storage</text>
  </g>
  
  <!-- Example callout - LEFT SIDE -->
  <rect x="30" y="295" width="125" height="105" rx="8" fill="rgba(124,58,237,0.2)" stroke="#7c3aed" stroke-width="1"/>
  <text x="92" y="323" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">💡 Example</text>
  <text x="92" y="350" text-anchor="middle" fill="#e9d5ff" font-size="10">"Trending" =</text>
  <text x="92" y="372" text-anchor="middle" fill="#86efac" font-size="11" font-weight="500">4.5+ stars</text>
  <text x="92" y="392" text-anchor="middle" fill="#86efac" font-size="11" font-weight="500">50+ reviews</text>
</svg>
