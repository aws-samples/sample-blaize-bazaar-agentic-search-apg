<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <!-- Purple gradient for conversations -->
    <linearGradient id="purpleGradSession" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Green gradient for messages -->
    <linearGradient id="greenGradSession" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Cyan gradient for session_metadata -->
    <linearGradient id="cyanGradSession" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Amber gradient for tool_uses -->
    <linearGradient id="amberGradSession" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blue gradient for Aurora -->
    <linearGradient id="blueGradSession" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background gradient -->
    <linearGradient id="bgGradSession" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Drop shadow -->
    <filter id="dropShadowSession" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="arrowPurpleSession" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="580" fill="url(#bgGradSession)" rx="12"/>
  
  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="600">
    Aurora Session State: ACID-Guaranteed Conversation Management
  </text>
  <text x="500" y="52" text-anchor="middle" fill="#a78bfa" font-size="11">
    bedrock_integration schema • Four-table architecture with CASCADE deletes
  </text>
  
  <!-- Schema tree on left -->
  <g transform="translate(25, 80)">
    <rect x="0" y="0" width="165" height="160" rx="8" fill="rgba(0,0,0,0.35)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
    <text x="82" y="22" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">Schema Structure</text>
    <line x1="10" y1="32" x2="155" y2="32" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    
    <text x="15" y="52" fill="#c4b5fd" font-size="9" font-family="monospace">bedrock_integration</text>
    <text x="20" y="70" fill="#e9d5ff" font-size="9" font-family="monospace">├─ conversations</text>
    <text x="20" y="88" fill="#86efac" font-size="9" font-family="monospace">├─ messages</text>
    <text x="20" y="106" fill="#67e8f9" font-size="9" font-family="monospace">├─ session_metadata</text>
    <text x="20" y="124" fill="#fcd34d" font-size="9" font-family="monospace">└─ tool_uses</text>
    
    <text x="82" y="148" text-anchor="middle" fill="#9ca3af" font-size="8">ON DELETE CASCADE</text>
  </g>
  
  <!-- Parent Table: conversations -->
  <g filter="url(#dropShadowSession)">
    <rect x="220" y="75" width="235" height="135" rx="8" fill="url(#purpleGradSession)"/>
    <text x="337" y="98" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">📋 conversations (parent)</text>
    <line x1="235" y1="108" x2="440" y2="108" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="232" y="125" fill="#e9d5ff" font-size="9" font-family="monospace">session_id     VARCHAR(255) PK</text>
    <text x="232" y="140" fill="#e9d5ff" font-size="9" font-family="monospace">agent_name     VARCHAR(255)</text>
    <text x="232" y="155" fill="#e9d5ff" font-size="9" font-family="monospace">context        JSONB</text>
    <text x="232" y="170" fill="#e9d5ff" font-size="9" font-family="monospace">created_at     TIMESTAMP</text>
    <text x="232" y="185" fill="#e9d5ff" font-size="9" font-family="monospace">updated_at     TIMESTAMP</text>
    <text x="232" y="200" fill="#e9d5ff" font-size="9" font-family="monospace">metadata       JSONB</text>
  </g>
  
  <!-- Arrows from parent to children -->
  <path d="M 337 210 L 337 235 L 250 235 L 250 260" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrowPurpleSession)"/>
  <path d="M 337 210 L 337 235 L 420 235 L 420 260" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrowPurpleSession)"/>
  <text x="337" y="248" text-anchor="middle" fill="#c4b5fd" font-size="9">1:N</text>
  
  <!-- Child Table 1: messages -->
  <g filter="url(#dropShadowSession)">
    <rect x="115" y="270" width="220" height="130" rx="8" fill="url(#greenGradSession)"/>
    <text x="225" y="293" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">💬 messages</text>
    <line x1="130" y1="303" x2="320" y2="303" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="125" y="320" fill="#bbf7d0" font-size="9" font-family="monospace">id            SERIAL PK</text>
    <text x="125" y="335" fill="#bbf7d0" font-size="9" font-family="monospace">session_id    FK CASCADE</text>
    <text x="125" y="350" fill="#bbf7d0" font-size="9" font-family="monospace">role          user|assistant|system</text>
    <text x="125" y="365" fill="#bbf7d0" font-size="9" font-family="monospace">content       TEXT NOT NULL</text>
    <text x="125" y="380" fill="#bbf7d0" font-size="9" font-family="monospace">created_at    TIMESTAMP</text>
    <text x="125" y="395" fill="#bbf7d0" font-size="9" font-family="monospace">metadata      JSONB</text>
  </g>
  
  <!-- Child Table 2: session_metadata -->
  <g filter="url(#dropShadowSession)">
    <rect x="355" y="270" width="220" height="115" rx="8" fill="url(#cyanGradSession)"/>
    <text x="465" y="293" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">👤 session_metadata</text>
    <line x1="370" y1="303" x2="560" y2="303" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="365" y="320" fill="#a5f3fc" font-size="9" font-family="monospace">session_id        PK + FK CASCADE</text>
    <text x="365" y="335" fill="#a5f3fc" font-size="9" font-family="monospace">user_preferences  JSONB</text>
    <text x="365" y="350" fill="#a5f3fc" font-size="9" font-family="monospace">context_data      JSONB</text>
    <text x="365" y="365" fill="#a5f3fc" font-size="9" font-family="monospace">last_activity     TIMESTAMP</text>
    <text x="465" y="382" text-anchor="middle" fill="#67e8f9" font-size="8">(1:1 relationship)</text>
  </g>
  
  <!-- Arrow from parent to tool_uses -->
  <path d="M 455 142 L 600 142 L 600 260" stroke="#a855f7" stroke-width="2" fill="none" marker-end="url(#arrowPurpleSession)"/>
  <text x="610" y="205" fill="#c4b5fd" font-size="9">1:N</text>
  
  <!-- Child Table 3: tool_uses -->
  <g filter="url(#dropShadowSession)">
    <rect x="510" y="270" width="220" height="130" rx="8" fill="url(#amberGradSession)"/>
    <text x="620" y="293" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">🔧 tool_uses</text>
    <line x1="525" y1="303" x2="715" y2="303" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="520" y="320" fill="#fef3c7" font-size="9" font-family="monospace">id            SERIAL PK</text>
    <text x="520" y="335" fill="#fef3c7" font-size="9" font-family="monospace">session_id    FK CASCADE</text>
    <text x="520" y="350" fill="#fef3c7" font-size="9" font-family="monospace">tool_name     VARCHAR NOT NULL</text>
    <text x="520" y="365" fill="#fef3c7" font-size="9" font-family="monospace">tool_input    JSONB</text>
    <text x="520" y="380" fill="#fef3c7" font-size="9" font-family="monospace">tool_output   JSONB</text>
    <text x="520" y="395" fill="#fef3c7" font-size="9" font-family="monospace">timestamp     TIMESTAMP</text>
  </g>
  
  <!-- Aurora PostgreSQL container -->
  <g filter="url(#dropShadowSession)">
    <rect x="760" y="130" width="215" height="175" rx="10" fill="url(#blueGradSession)"/>
    <text x="867" y="158" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">🗄️ Aurora PostgreSQL</text>
    <line x1="775" y1="170" x2="960" y2="170" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="867" y="192" text-anchor="middle" fill="#93c5fd" font-size="10">✓ ACID Transactions</text>
    <text x="867" y="212" text-anchor="middle" fill="#93c5fd" font-size="10">✓ Point-in-Time Recovery</text>
    <text x="867" y="232" text-anchor="middle" fill="#93c5fd" font-size="10">✓ Multi-AZ Replication</text>
    <text x="867" y="252" text-anchor="middle" fill="#93c5fd" font-size="10">✓ Same DB as Vectors</text>
    <text x="867" y="272" text-anchor="middle" fill="#93c5fd" font-size="10">✓ Indexed Lookups</text>
    <text x="867" y="292" text-anchor="middle" fill="#93c5fd" font-size="10">✓ CASCADE Deletes</text>
  </g>
  
  <!-- Dashed lines to Aurora -->
  <line x1="455" y1="142" x2="755" y2="200" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="335" y1="335" x2="755" y2="240" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="575" y1="335" x2="755" y2="260" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="730" y1="335" x2="755" y2="280" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
  
  <!-- Key Features Panel at bottom -->
  <g transform="translate(25, 420)">
    <rect x="0" y="0" width="950" height="135" rx="10" fill="rgba(0,0,0,0.3)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="475" y="25" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Key Features &amp; Relationships</text>
    <line x1="20" y1="38" x2="930" y2="38" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    
    <!-- Feature columns -->
    <g transform="translate(30, 55)">
      <text x="0" y="0" fill="#c4b5fd" font-size="10" font-weight="600">conversations (1)</text>
      <text x="0" y="18" fill="#9ca3af" font-size="9">• Session lifecycle</text>
      <text x="0" y="34" fill="#9ca3af" font-size="9">• Agent assignment</text>
      <text x="0" y="50" fill="#9ca3af" font-size="9">• JSONB context</text>
      <text x="0" y="66" fill="#9ca3af" font-size="9">• Timestamps indexed</text>
    </g>
    
    <g transform="translate(200, 55)">
      <text x="0" y="0" fill="#86efac" font-size="10" font-weight="600">messages (N)</text>
      <text x="0" y="18" fill="#9ca3af" font-size="9">• Conversation history</text>
      <text x="0" y="34" fill="#9ca3af" font-size="9">• Role validation</text>
      <text x="0" y="50" fill="#9ca3af" font-size="9">• Ordered by time</text>
      <text x="0" y="66" fill="#9ca3af" font-size="9">• session_id indexed</text>
    </g>
    
    <g transform="translate(380, 55)">
      <text x="0" y="0" fill="#67e8f9" font-size="10" font-weight="600">session_metadata (1)</text>
      <text x="0" y="18" fill="#9ca3af" font-size="9">• User preferences</text>
      <text x="0" y="34" fill="#9ca3af" font-size="9">• Context data</text>
      <text x="0" y="50" fill="#9ca3af" font-size="9">• 1:1 with session</text>
      <text x="0" y="66" fill="#9ca3af" font-size="9">• Activity tracking</text>
    </g>
    
    <g transform="translate(580, 55)">
      <text x="0" y="0" fill="#fcd34d" font-size="10" font-weight="600">tool_uses (N)</text>
      <text x="0" y="18" fill="#9ca3af" font-size="9">• Execution tracking</text>
      <text x="0" y="34" fill="#9ca3af" font-size="9">• Input/output JSONB</text>
      <text x="0" y="50" fill="#9ca3af" font-size="9">• Debugging audit</text>
      <text x="0" y="66" fill="#9ca3af" font-size="9">• timestamp indexed</text>
    </g>
    
    <g transform="translate(770, 55)">
      <text x="0" y="0" fill="#93c5fd" font-size="10" font-weight="600">Why Aurora?</text>
      <text x="0" y="18" fill="#86efac" font-size="9">✅ No Redis/DynamoDB</text>
      <text x="0" y="34" fill="#86efac" font-size="9">✅ ACID guarantees</text>
      <text x="0" y="50" fill="#86efac" font-size="9">✅ Full audit trail</text>
      <text x="0" y="66" fill="#86efac" font-size="9">✅ Multi-tenancy ready</text>
    </g>
  </g>
</svg>
